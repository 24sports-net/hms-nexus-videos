name: Build Videos JSON

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Videos Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Videos.json
        run: node scripts/merge-videos.js

      - name: Upload Videos.json
        uses: actions/upload-artifact@v4
        with:
          name: Videos
          path: Videos.json
