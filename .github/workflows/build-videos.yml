name: Build Videos.json

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Videos.json
        run: node scripts/merge-videos.js

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: 24sports-net/hms-nexus
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          path: target

      - name: Copy Videos.json
        run: |
          cp Videos.json target/Videos.json

      - name: Commit & Push
        run: |
          cd target

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Videos.json

          if git diff --cached --quiet; then
            echo "No changes to Videos.json"
          else
            git commit -m "🤖 Auto update Videos.json"
            git push
          fi
