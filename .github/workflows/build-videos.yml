name: Build Videos.json

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Videos.json
        run: node scripts/merge-videos.js

      - name: Commit Videos.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Videos.json

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "🤖 Auto update Videos.json"
            git push
          fi
